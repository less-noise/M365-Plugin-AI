<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel AI 助手</title>
  
  <!-- Office.js -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  
  <!-- 共用样式 -->
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <!-- 标题栏 -->
  <div class="header">
    <span class="header-icon">📊</span>
    <span class="header-title">Excel AI 助手</span>
  </div>
  
  <!-- 选区信息 -->
  <div class="section">
    <div class="label">当前选区信息：</div>
    <div class="selection-info" id="selectionInfo">点击"开始处理"时自动读取选区数据</div>
  </div>
  
  <!-- 功能选择 -->
  <div class="section">
    <div class="label">选择处理功能：</div>
    <div class="radio-group">
      <div class="radio-item">
        <input type="radio" id="funcClean" name="function" value="clean" checked>
        <label for="funcClean">数据清洗</label>
      </div>
      <div class="radio-item">
        <input type="radio" id="funcQuestion" name="function" value="question">
        <label for="funcQuestion">自然语言提问</label>
      </div>
      <div class="radio-item">
        <input type="radio" id="funcTrend" name="function" value="trend">
        <label for="funcTrend">数据趋势描述</label>
      </div>
      <div class="radio-item">
        <input type="radio" id="funcFormula" name="function" value="formula">
        <label for="funcFormula">生成公式</label>
      </div>
    </div>
  </div>
  
  <!-- 问题/指令输入 -->
  <div class="section">
    <div class="label">你的问题 / 指令：</div>
    <textarea class="text-input" id="userInput" rows="3" placeholder="请输入你的问题或指令..."></textarea>
    <div class="placeholder-hint" id="placeholderHint">示例：去除重复行，将日期列统一格式为YYYY-MM-DD</div>
  </div>
  
  <!-- 开始处理 -->
  <div class="section">
    <button id="processBtn" class="btn btn-primary btn-block">▶ 开始处理</button>
  </div>
  
  <!-- AI 结果 -->
  <div class="section">
    <div class="label">AI 结果：</div>
    <div class="result-box" id="resultBox"></div>
    <div class="action-buttons">
      <button id="copyBtn" class="btn btn-secondary btn-small" disabled>📋 复制结果</button>
    </div>
  </div>
  
  <!-- 加载状态 -->
  <div class="loading" id="loadingDiv" style="display: none;">
    <div class="loading-spinner"></div>
    <span class="loading-text">AI 正在处理中...</span>
  </div>
  
  <!-- 错误提示 -->
  <div class="error-box" id="errorBox" style="display: none;"></div>
  
  <!-- 复制成功提示 -->
  <div class="copy-success" id="copySuccess">已复制到剪贴板</div>
  
  <!-- 引入共用模块 -->
  <script src="../shared/config-loader.js"></script>
  <script src="../shared/api.js"></script>
  
  <!-- 主逻辑 -->
  <script src="taskpane.js"></script>
</body>
</html>
